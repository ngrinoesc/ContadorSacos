<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Paletizado Preciso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; background-color: #020617; }
        canvas { display: block; }
        .ui-overlay { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        .ui-panel { pointer-events: auto; }
    </style>
</head>
<body>

    <div class="ui-overlay w-full max-w-xs p-2">
        <div class="ui-panel bg-white/95 backdrop-blur-md p-6 rounded-[2rem] shadow-2xl border border-white/50">
            <h1 class="text-xl font-900 text-slate-900 leading-none tracking-tighter mb-1">Cubicaje de Precisión</h1>
            <p class="text-indigo-600 text-[10px] font-bold uppercase tracking-[0.2em] mb-6">Bloque Nivelado • 70 Sacos</p>

            <div class="mb-6">
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest">Cantidad en Palet</label>
                <input 
                    type="number" 
                    id="sacosInput" 
                    value="10"
                    min="0"
                    max="70"
                    class="w-full text-4xl font-black px-4 py-3 bg-slate-100 border-2 border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all text-slate-800"
                >
            </div>

            <div id="resultBox" class="bg-slate-900 rounded-2xl p-4 text-white border-b-4 border-indigo-500">
                <p id="resultText" class="text-sm font-bold italic opacity-90"></p>
            </div>

            <p class="mt-6 text-[9px] text-slate-400 font-bold uppercase text-center tracking-tighter">Arrastra para rotar la carga</p>
        </div>
    </div>

    <div id="canvas-container" class="w-full h-screen"></div>

    <script>
        let scene, camera, renderer, mainGroup, sackGroup;
        const SACOS_POR_FILA = 7;
        const TOTAL_MAX = 70;
        
        // Constantes Geométricas para un ajuste perfecto (4x4 aprox)
        const W = 1.333; // Ancho del saco
        const L = 2.0;   // Largo del saco
        const H = 0.42;  // Altura del saco
        
        // El bloque total mide: (L + 2W) de ancho y (3W) de profundidad
        // Con estos valores: 2.0 + 2.666 = 4.666 de ancho | 3 * 1.333 = 4.0 de profundidad
        const TOTAL_WIDTH = L + (2 * W); 
        const TOTAL_DEPTH = 3 * W;

        let isMouseDown = false;
        let targetRotationX = 0.5, targetRotationY = 0.8;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020617);

            camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(12, 10, 12);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Iluminación Profesional
            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            const mainLight = new THREE.DirectionalLight(0xffffff, 0.8);
            mainLight.position.set(5, 15, 10);
            mainLight.castShadow = true;
            mainLight.shadow.mapSize.set(2048, 2048);
            scene.add(mainLight);

            const blueLight = new THREE.PointLight(0x6366f1, 0.5);
            blueLight.position.set(-10, 5, -5);
            scene.add(blueLight);

            // Grupo unificado para rotación sólida
            mainGroup = new THREE.Group();
            scene.add(mainGroup);

            createCustomPallet();

            sackGroup = new THREE.Group();
            mainGroup.add(sackGroup);

            // Controles de ratón
            document.addEventListener('mousedown', () => isMouseDown = true);
            document.addEventListener('mouseup', () => isMouseDown = false);
            document.addEventListener('mousemove', (e) => {
                if(isMouseDown) {
                    targetRotationY += e.movementX * 0.007;
                    targetRotationX += e.movementY * 0.007;
                }
            });

            window.addEventListener('resize', onWindowResize);
            updateSacks(10);
        }

        function createCustomPallet() {
            const woodMat = new THREE.MeshPhongMaterial({ color: 0x4a3728 });
            const palletBase = new THREE.Group();
            
            // Listones superiores ajustados al bloque de sacos
            const slatWidth = TOTAL_WIDTH + 0.2;
            const slatDepth = 0.5;
            for(let i = 0; i < 6; i++) {
                const slat = new THREE.Mesh(new THREE.BoxGeometry(slatWidth, 0.12, slatDepth), woodMat);
                slat.position.set(0, 0, (i * (TOTAL_DEPTH/5)) - (TOTAL_DEPTH/2));
                slat.castShadow = true;
                slat.receiveShadow = true;
                palletBase.add(slat);
            }

            // Vigas de soporte
            const beamGeom = new THREE.BoxGeometry(slatWidth, 0.2, 0.15);
            for(let i = -1; i <= 1; i++) {
                const beam = new THREE.Mesh(beamGeom, woodMat);
                beam.position.set(0, -0.16, i * (TOTAL_DEPTH/2 - 0.1));
                palletBase.add(beam);
            }

            palletBase.position.y = 0.4;
            mainGroup.add(palletBase);
        }

        function createBag(isFull) {
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const material = new THREE.MeshPhongMaterial({ 
                color: isFull ? 0xffffff : 0x1e293b,
                opacity: isFull ? 1.0 : 0.05,
                transparent: !isFull,
                shininess: 20
            });
            const mesh = new THREE.Mesh(geometry, material);
            
            if(isFull) {
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                
                // Agregar bordes negros para diferenciar los sacos
                const edges = new THREE.EdgesGeometry(geometry);
                const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000 }));
                mesh.add(line);
            }
            return mesh;
        }

        function updateSacks(count) {
            sackGroup.clear();
            
            for (let i = 0; i < TOTAL_MAX; i++) {
                const layerIndex = Math.floor(i / SACOS_POR_FILA);
                const posInLayer = i % SACOS_POR_FILA;
                const isFull = i < count;
                const isEvenLayer = layerIndex % 2 === 0;

                const bag = createBag(isFull);
                
                // LÓGICA DE ALINEACIÓN POR BORDES (Footprint 4.66 x 4.0)
                if (posInLayer < 4) {
                    // Bloque de 4 sacos (Verticales)
                    const row = Math.floor(posInLayer / 2);
                    const col = posInLayer % 2;
                    bag.scale.set(W, H, L);
                    
                    // Calculamos X para que el borde exterior sea ±TOTAL_WIDTH/2
                    let x = (TOTAL_WIDTH / 2) - L - (W / 2) - (col * W);
                    let z = (row === 0 ? -L/2 : L/2);
                    
                    if (!isEvenLayer) {
                        x = -x; // Inversión para trabado (mantiene el bloque centrado)
                    }

                    bag.position.set(x, (layerIndex * (H + 0.01)) + 0.75, z);
                } 
                else {
                    // Bloque de 3 sacos (Horizontales)
                    const hIndex = posInLayer - 4;
                    bag.scale.set(L, H, W);
                    
                    let x = (TOTAL_WIDTH / 2) - (L / 2);
                    let z = (hIndex - 1) * W;

                    if (!isEvenLayer) {
                        x = -x;
                    }

                    bag.position.set(x, (layerIndex * (H + 0.01)) + 0.75, z);
                }

                sackGroup.add(bag);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            mainGroup.rotation.y += (targetRotationY - mainGroup.rotation.y) * 0.1;
            mainGroup.rotation.x += (targetRotationX - mainGroup.rotation.x) * 0.1;
            mainGroup.rotation.x = Math.max(0, Math.min(Math.PI / 2.2, mainGroup.rotation.x));
            renderer.render(scene, camera);
        }

        const input = document.getElementById('sacosInput');
        const resultText = document.getElementById('resultText');

        function updateUI(val) {
            const filas = Math.floor(val / SACOS_POR_FILA);
            const resto = val % SACOS_POR_FILA;
            let msg = "";
            if (filas > 0 && resto > 0) msg = `Tienes ${filas} ${filas === 1 ? 'fila' : 'filas'} y ${resto} sacos sueltos.`;
            else if (filas > 0) msg = `Paletizado con ${filas} ${filas === 1 ? 'fila' : 'filas'} completas.`;
            else msg = `Total actual: ${resto} ${resto === 1 ? 'saco' : 'sacos'}.`;
            resultText.innerText = msg;
        }

        input.addEventListener('input', (e) => {
            let val = parseInt(e.target.value) || 0;
            val = Math.max(0, Math.min(TOTAL_MAX, val));
            input.value = val;
            updateUI(val);
            updateSacks(val);
        });

        window.onload = () => {
            init();
            animate();
            updateUI(10);
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Palets - Sacos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container-main {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .input-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
        }

        .input-group-custom {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .input-group-custom input {
            padding: 12px 20px;
            font-size: 1.1rem;
            border: 2px solid #667eea;
            border-radius: 8px;
            width: 150px;
            transition: all 0.3s ease;
        }

        .input-group-custom input:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-group-custom label {
            font-weight: bold;
            color: #333;
            margin-bottom: 0;
        }

        .btn-calcular {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .btn-calcular:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            color: white;
        }

        .resultados-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
        }

        .resumen-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
        }

        .palets-container {
            margin-top: 30px;
        }

        .palets-titulo {
            font-size: 1.3rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        .palets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 50px;
            margin-bottom: 30px;
            justify-items: center;
        }

        /* Estilos del Palet 3D */
        .palet-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            perspective: 1200px;
        }

        .palet-3d-container {
            position: relative;
            width: 380px;
            height: 320px;
            transform-style: preserve-3d;
            transform: rotateX(15deg) rotateZ(5deg);
        }

        /* Tablones del palet (vista 3D) */
        .palet-tablones {
            position: absolute;
            width: 100%;
            height: 40px;
            bottom: 0;
            background: linear-gradient(135deg, #8b6f47 0%, #5d4e37 50%, #3d2817 100%);
            border-radius: 3px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .tablon-line {
            flex: 1;
            border-bottom: 2px solid rgba(0, 0, 0, 0.3);
            background: linear-gradient(180deg, transparent 0%, rgba(0, 0, 0, 0.1) 100%);
        }

        /* Contenedor de sacos */
        .sacos-container-3d {
            position: absolute;
            width: 100%;
            height: 260px;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 12px;
            justify-content: flex-start;
            z-index: 10;
        }

        .linea-sacos {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-wrap: wrap;
            min-height: 50px;
            align-items: center;
        }

        .saco {
            width: 48px;
            height: 52px;
            background: linear-gradient(135deg, #d4a574 0%, #c19858 50%, #9d7e3a 100%);
            border: 2px solid #6b5532;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            color: #fff;
            font-weight: bold;
            box-shadow:
                inset 0 1px 3px rgba(255, 255, 255, 0.4),
                inset 0 -1px 3px rgba(0, 0, 0, 0.3),
                0 4px 8px rgba(0, 0, 0, 0.3);
            position: relative;
            flex-shrink: 0;
        }

        .saco::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 15px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.3) 0%, transparent 100%);
            border-radius: 2px 2px 0 0;
            z-index: 2;
        }

        .saco::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 2px;
            height: 40%;
            background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.2) 50%, transparent 100%);
            z-index: 1;
        }

        .palet-info {
            margin-top: 30px;
            text-align: center;
            font-weight: bold;
            color: #333;
        }

        .palet-tipo {
            font-size: 1rem;
            margin-bottom: 8px;
            color: #667eea;
        }

        .palet-sacos-count {
            font-size: 0.9rem;
            color: #666;
        }

        .resumen-final {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
        }

        .resumen-final.warning {
            background: linear-gradient(135deg, #ffc107 0%, #ff9800 100%);
            color: #333;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .input-group-custom {
                flex-direction: column;
                align-items: stretch;
            }

            .input-group-custom input {
                width: 100%;
            }

            .btn-calcular {
                width: 100%;
            }

            .palets-grid {
                grid-template-columns: 1fr;
                gap: 30px;
            }

            .palet-3d-container {
                width: 320px;
                height: 280px;
            }

            .saco {
                width: 40px;
                height: 44px;
                font-size: 0.65rem;
            }

            .linea-sacos {
                min-height: 45px;
            }
        }
    </style>
</head>
<body>
    <div class="container-main">
        <!-- Header -->
        <div class="header">
            <h1>📦 Calculadora de Palets</h1>
            <p>Calcula automáticamente cuántos palets necesitas para tus sacos</p>
        </div>

        <!-- Sección de Entrada -->
        <div class="input-section">
            <div class="input-group-custom">
                <label for="sacos">Total de Sacos:</label>
                <input type="number" id="sacos" placeholder="Ej: 150" value="70">
                <button class="btn-calcular" onclick="calcularPalets()">Calcular</button>
            </div>
        </div>

        <!-- Sección de Resultados -->
        <div class="resultados-section" id="resultadosSection" style="display: none;">
            <!-- Estadísticas -->
            <div class="resumen-stats">
                <div class="stat-card">
                    <div class="stat-label">Total de Sacos</div>
                    <div class="stat-value" id="totalSacos">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Palets Completos</div>
                    <div class="stat-value" id="paletCompletos">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Sacos Restantes</div>
                    <div class="stat-value" id="sacosRestantes">0</div>
                </div>
            </div>

            <!-- Visualización de Palets -->
            <div class="palets-container">
                <div class="palets-titulo">Distribución de Palets</div>
                <div class="palets-grid" id="paletsGrid"></div>
            </div>

            <!-- Resumen Final -->
            <div class="resumen-final" id="resumenFinal"></div>
        </div>

        <!-- Mensaje Inicial -->
        <div id="mensajeInicial" style="text-align: center; color: white; margin-top: 50px;">
            <p style="font-size: 1.1rem;">Ingresa la cantidad de sacos y haz clic en "Calcular"</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const SACOS_POR_LINEA = 7;
        const LINEAS_PALET_COMPLETO = 10;
        const SACOS_PALET_COMPLETO = SACOS_POR_LINEA * LINEAS_PALET_COMPLETO; // 70
        const SACOS_MEDIA_PALET = 35; // 5 líneas
        const SACOS_CUATRO_LINEAS = 28; // 4 líneas

        function generarPalet(numeroSacos, esParcial = false) {
            const wrapper = document.createElement('div');
            wrapper.className = 'palet-wrapper';

            // Contenedor 3D del palet
            const palet3dContainer = document.createElement('div');
            palet3dContainer.className = 'palet-3d-container';

            // Sacos en el palet
            const sacosContainer = document.createElement('div');
            sacosContainer.className = 'sacos-container-3d';

            const lineasCompletas = Math.floor(numeroSacos / SACOS_POR_LINEA);
            const sacosRestantes = numeroSacos % SACOS_POR_LINEA;

            // Líneas completas
            for (let i = 0; i < lineasCompletas; i++) {
                const lineaSacos = document.createElement('div');
                lineaSacos.className = 'linea-sacos';

                for (let j = 0; j < SACOS_POR_LINEA; j++) {
                    const saco = document.createElement('div');
                    saco.className = 'saco';
                    saco.textContent = (i * SACOS_POR_LINEA + j + 1);
                    lineaSacos.appendChild(saco);
                }

                sacosContainer.appendChild(lineaSacos);
            }

            // Línea parcial (si existe)
            if (sacosRestantes > 0) {
                const lineaSacos = document.createElement('div');
                lineaSacos.className = 'linea-sacos';

                for (let j = 0; j < sacosRestantes; j++) {
                    const saco = document.createElement('div');
                    saco.className = 'saco';
                    saco.textContent = (lineasCompletas * SACOS_POR_LINEA + j + 1);
                    lineaSacos.appendChild(saco);
                }

                sacosContainer.appendChild(lineaSacos);
            }

            palet3dContainer.appendChild(sacosContainer);

            // Tablones del palet
            const paletTablones = document.createElement('div');
            paletTablones.className = 'palet-tablones';

            for (let i = 0; i < 4; i++) {
                const tablon = document.createElement('div');
                tablon.className = 'tablon-line';
                paletTablones.appendChild(tablon);
            }

            palet3dContainer.appendChild(paletTablones);

            wrapper.appendChild(palet3dContainer);

            // Información del palet
            const info = document.createElement('div');
            info.className = 'palet-info';

            let tipoTexto = '';
            if (numeroSacos === SACOS_PALET_COMPLETO) {
                tipoTexto = '✅ Palet Completo';
            } else if (numeroSacos === SACOS_MEDIA_PALET) {
                tipoTexto = '⚠️ Media Palet';
            } else if (numeroSacos === SACOS_CUATRO_LINEAS) {
                tipoTexto = '📋 4 Líneas';
            } else {
                tipoTexto = '📦 Palet Parcial';
            }

            info.innerHTML = `
                <div class="palet-tipo">${tipoTexto}</div>
                <div class="palet-sacos-count">${numeroSacos} sacos (${lineasCompletas}${sacosRestantes > 0 ? `.${Math.round((sacosRestantes / SACOS_POR_LINEA) * 10)}` : ''} líneas)</div>
            `;

            wrapper.appendChild(info);

            return wrapper;
        }

        function calcularPalets() {
            const inputSacos = document.getElementById('sacos').value;

            if (!inputSacos || inputSacos <= 0) {
                alert('Por favor ingresa una cantidad válida de sacos');
                return;
            }

            const totalSacos = parseInt(inputSacos);
            const paletCompletos = Math.floor(totalSacos / SACOS_PALET_COMPLETO);
            const restante = totalSacos % SACOS_PALET_COMPLETO;

            // Actualizar estadísticas
            document.getElementById('totalSacos').textContent = totalSacos;
            document.getElementById('paletCompletos').textContent = paletCompletos;
            document.getElementById('sacosRestantes').textContent = restante;

            // Limpiar grid de palets
            const paletsGrid = document.getElementById('paletsGrid');
            paletsGrid.innerHTML = '';

            // Generar palets completos
            for (let i = 0; i < paletCompletos; i++) {
                paletsGrid.appendChild(generarPalet(SACOS_PALET_COMPLETO));
            }

            // Generar palet parcial (si existe)
            if (restante > 0) {
                paletsGrid.appendChild(generarPalet(restante, true));
            }

            // Generar resumen final
            generarResumenFinal(totalSacos, paletCompletos, restante);

            // Mostrar resultados
            document.getElementById('resultadosSection').style.display = 'block';
            document.getElementById('mensajeInicial').style.display = 'none';

            // Scroll a resultados
            document.querySelector('.resultados-section').scrollIntoView({ behavior: 'smooth' });
        }

        function generarResumenFinal(totalSacos, paletCompletos, restante) {
            const resumenDiv = document.getElementById('resumenFinal');
            let mensaje = '';

            if (restante === 0) {
                mensaje = `✅ Necesitas ${paletCompletos} palet${paletCompletos > 1 ? 'es' : ''} para ${totalSacos} sacos`;
            } else if (restante === SACOS_MEDIA_PALET) {
                mensaje = `📦 Necesitas ${paletCompletos} palet${paletCompletos > 1 ? 'es' : ''} + 1 MEDIA PALET para ${totalSacos} sacos`;
            } else if (restante === SACOS_CUATRO_LINEAS) {
                mensaje = `📦 Necesitas ${paletCompletos} palet${paletCompletos > 1 ? 'es' : ''} + 4 LÍNEAS (28 sacos) para ${totalSacos} sacos`;
            } else {
                const lineas = Math.floor(restante / SACOS_POR_LINEA);
                const sacosExtra = restante % SACOS_POR_LINEA;
                mensaje = `📦 Necesitas ${paletCompletos} palet${paletCompletos > 1 ? 'es' : ''} + 1 palet parcial (${lineas} líneas`;
                if (sacosExtra > 0) {
                    mensaje += ` + ${sacosExtra} saco${sacosExtra > 1 ? 's' : ''}`;
                }
                mensaje += `) para ${totalSacos} sacos`;
                resumenDiv.classList.add('warning');
            }

            resumenDiv.classList.remove('warning');
            if (restante > 0 && restante !== SACOS_MEDIA_PALET && restante !== SACOS_CUATRO_LINEAS) {
                resumenDiv.classList.add('warning');
            }

            resumenDiv.textContent = mensaje;
        }

        // Permitir calcular con Enter
        document.getElementById('sacos').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                calcularPalets();
            }
        });
    </script>
</body>
</html>

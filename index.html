<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Logística 3D Responsiva</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #f1f5f9;
            overscroll-behavior-y: none;
            touch-action: pan-x pan-y;
        }

        canvas {
            display: block;
            touch-action: none;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            border-right: 1px solid rgba(255, 255, 255, 0.2);
        }

        #sidebar {
            transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1);
            padding-bottom: env(safe-area-inset-bottom);
        }

        @media (max-width: 767px) {
            .menu-closed {
                transform: translateY(100%);
            }
        }
        @media (min-width: 768px) {
            .menu-closed {
                transform: translateX(-100%);
            }
        }

        /* Scrollbar styles */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>

<body class="bg-slate-100">

    <!-- Mobile Navbar & Controls -->
    <div class="fixed top-0 left-0 w-full z-40 p-4 flex justify-between items-start pointer-events-none" style="padding-top: max(1rem, env(safe-area-inset-top));">
        <button id="menuToggle"
            class="p-3 bg-blue-600/90 backdrop-blur text-white rounded-2xl shadow-xl hover:bg-blue-700 transition-all pointer-events-auto active:scale-90 flex items-center justify-center h-12 w-12 border border-blue-500/50">
            <svg id="menuIcon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
        
        <!-- Interactive Tip (only visible briefly or when empty) -->
        <div id="gestureTip" class="bg-white/90 backdrop-blur px-4 py-2 rounded-full shadow-lg pointer-events-auto text-[10px] font-black text-slate-600 uppercase tracking-widest flex items-center gap-2 transition-opacity duration-700">
            <svg class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"></path></svg>
            Desliza 3D
        </div>
    </div>

    <!-- UI Sidebar Responsiva (Bottom Sheet on Mobile, Sidebar on Desktop) -->
    <div id="sidebar"
        class="fixed z-50 glass-panel flex flex-col shadow-[0_-10px_40px_rgba(0,0,0,0.1)] md:shadow-[10px_0_40px_rgba(0,0,0,0.1)] 
               bottom-0 left-0 w-full h-[75vh] sm:h-[65vh] rounded-t-3xl 
               md:top-0 md:bottom-auto md:h-full md:w-[420px] md:rounded-none">
        
        <!-- Drag Handle Mobile -->
        <div class="w-full flex justify-center pt-3 pb-2 md:hidden touch-pan-y cursor-grab active:cursor-grabbing" id="dragHandle">
            <div class="w-12 h-1.5 bg-slate-300 rounded-full"></div>
        </div>

        <div class="px-6 md:px-8 mt-2 md:mt-12 flex-grow overflow-y-auto pb-8 relative">
            <h1 class="text-2xl font-black text-slate-800 tracking-tight mb-1">LOGÍSTICA 3D</h1>
            <p class="text-xs text-slate-500 mb-6 font-medium leading-relaxed">Gestión de carga automática (Frontal → Trasero)</p>

            <!-- Formulario -->
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 mb-6 space-y-4">
                <div class="flex gap-4">
                    <div class="space-y-2 flex-grow">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Tipo de Masa</label>
                        <div class="relative">
                            <select id="sackType"
                                class="w-full p-3.5 bg-slate-50 hover:bg-slate-100 border border-slate-200 rounded-2xl text-sm font-semibold focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all appearance-none cursor-pointer">
                                <option value="dura" data-color="#8B4513">🍪 Dura</option>
                                <option value="blanda" data-color="#F5F5DC">🥐 Blanda</option>
                                <option value="integral" data-color="#D2B48C">🌾 Integral</option>
                                <option value="especial" data-color="#DEB887">✨ Especial</option>
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-400">
                                <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                            </div>
                        </div>
                    </div>
                    <div class="space-y-2 w-28">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Cant.</label>
                        <input type="number" id="sackQuantity" value="14" min="1" max="700" inputmode="numeric" pattern="[0-9]*"
                            class="w-full p-3.5 bg-slate-50 hover:bg-slate-100 border border-slate-200 rounded-2xl text-sm font-black text-center focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                    </div>
                </div>
                <button onclick="handleAutoLoad()"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl shadow-[0_8px_20px_rgba(37,99,235,0.3)] transition-all active:scale-95 text-sm uppercase tracking-widest flex justify-center items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
                    Añadir al Camión
                </button>
            </div>

            <!-- Dashboard del Camión -->
            <div>
                <div class="flex justify-between items-center mb-4 ml-1">
                    <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Monitor de Palets</h3>
                    <span id="totalPalletsCounter" class="bg-blue-100 text-blue-700 font-bold text-[10px] px-2.5 py-1 rounded-full border border-blue-200">0 / 10</span>
                </div>
                
                <div id="truckStatus" class="grid grid-cols-2 xs:grid-cols-3 sm:grid-cols-2 gap-3 pb-4"></div>
                
                <div id="emptyTruckMsg"
                    class="flex flex-col items-center justify-center py-10 bg-white rounded-3xl border border-dashed border-slate-200 shadow-sm">
                    <svg class="w-10 h-10 text-slate-200 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
                    <p class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Camión Vacío</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 3D Scene Container -->
    <div id="threejs-container" class="absolute inset-0"></div>

    <!-- Notifications Container -->
    <div id="notificationWrapper" class="fixed top-6 left-1/2 -translate-x-1/2 md:translate-x-0 md:left-auto md:right-6 z-[100] w-max flex flex-col gap-2 pointer-events-none p-4" style="padding-top: max(1.5rem, env(safe-area-inset-top));">
        <!-- Notifications injected dynamically -->
    </div>

    <script>
        // CONFIGURACIÓN TÉCNICA
        const SACOS_POR_FILA = 7;
        const TOTAL_MAX_PALLET = 70;
        const MAX_PALLETS_PER_TRUCK = 10;
        const W = 1.333, L = 2.0, H = 0.42;
        const TOTAL_WIDTH = L + (2 * W), TOTAL_DEPTH = 3 * W;

        let loadedPallets = [];
        let isMenuOpen = false;
        
        let scene, camera, renderer, truckContainer, controls;

        function init3D() {
            const container = document.getElementById('threejs-container');
            
            // Scene Setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf1f5f9);
            // Optional Fog to blend with background
            scene.fog = new THREE.Fog(0xf1f5f9, 30, 80);

            // Camera Setup
            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(32, 22, 32);

            // Renderer Setup
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            // Orbit Controls (Crucial for mobile experience)
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 - 0.1; // Do not go below ground
            controls.minDistance = 15;
            controls.maxDistance = 65;
            controls.target.set(0, 3, 0);
            controls.autoRotate = true;
            controls.autoRotateSpeed = 2.0;

            // Stop rotation on interaction and hide tip
            controls.addEventListener('start', () => { 
                controls.autoRotate = false; 
                const tip = document.getElementById('gestureTip');
                if (tip) tip.style.opacity = '0';
            });

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
            directionalLight.position.set(20, 40, 20);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.set(1024, 1024);
            directionalLight.shadow.camera.near = 0.5;
            directionalLight.shadow.camera.far = 100;
            const ds = 20;
            directionalLight.shadow.camera.left = -ds;
            directionalLight.shadow.camera.right = ds;
            directionalLight.shadow.camera.top = ds;
            directionalLight.shadow.camera.bottom = -ds;
            directionalLight.shadow.bias = -0.001;
            scene.add(directionalLight);

            const hemiLight = new THREE.HemisphereLight(0xffffff, 0xf1f5f9, 0.4);
            hemiLight.position.set(0, 50, 0);
            scene.add(hemiLight);

            // Ground & Grid
            const grid = new THREE.GridHelper(80, 40, 0xe2e8f0, 0xe2e8f0);
            grid.position.y = -0.01;
            scene.add(grid);

            createTruck();
            setupMenuInit();

            window.addEventListener('resize', onWindowResize, false);
            
            // Auto hide gesture tip
            setTimeout(() => {
                const tip = document.getElementById('gestureTip');
                if(tip && tip.style.opacity !== '0') tip.style.opacity = '0';
            }, 5000);

            animate();
        }

        function setupMenuInit() {
            const btn = document.getElementById('menuToggle');
            const dragHandle = document.getElementById('dragHandle');

            isMenuOpen = window.innerWidth >= 768; // Default open on desktop
            updateMenuVisuals();

            btn.addEventListener('click', () => {
                isMenuOpen = !isMenuOpen;
                updateMenuVisuals();
            });

            // Mobile drag-to-close logic
            let startY = 0;
            dragHandle.addEventListener('touchstart', e => {
                startY = e.touches[0].clientY;
            }, {passive: true});
            
            dragHandle.addEventListener('touchmove', e => {
                const currentY = e.touches[0].clientY;
                if(currentY > startY + 40) { // 40px threshold
                    if (isMenuOpen) {
                        isMenuOpen = false;
                        updateMenuVisuals();
                    }
                }
            }, {passive: true});
        }

        function updateMenuVisuals() {
            const sidebar = document.getElementById('sidebar');
            const icon = document.getElementById('menuIcon');

            if (isMenuOpen) {
                sidebar.classList.remove('menu-closed');
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />';
            } else {
                sidebar.classList.add('menu-closed');
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16M4 18h16" />';
            }
        }

        function createCustomPallet() {
            const woodMat = new THREE.MeshPhongMaterial({ color: 0x5c4033 });
            const palletBase = new THREE.Group();
            const slatW = TOTAL_WIDTH + 0.1, slatD = 0.5;
            
            // Top slats
            for (let i = 0; i < 6; i++) {
                const slat = new THREE.Mesh(new THREE.BoxGeometry(slatW, 0.15, slatD), woodMat);
                slat.position.set(0, 0, (i * (TOTAL_DEPTH / 5)) - (TOTAL_DEPTH / 2));
                slat.castShadow = true;
                slat.receiveShadow = true;
                palletBase.add(slat);
            }
            
            // Bottom beams
            const beamG = new THREE.BoxGeometry(slatW, 0.3, 0.2);
            for (let i = -1; i <= 1; i++) {
                const beam = new THREE.Mesh(beamG, woodMat);
                beam.position.set(0, -0.22, i * (TOTAL_DEPTH / 2 - 0.15));
                beam.castShadow = true;
                beam.receiveShadow = true;
                palletBase.add(beam);
            }
            return palletBase;
        }

        function createBag(colorHex) {
            const g = new THREE.BoxGeometry(1, 1, 1);
            const m = new THREE.MeshPhongMaterial({ color: 0xf8fafc, shininess: 5 });
            const mesh = new THREE.Mesh(g, m);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            
            const edgesMat = new THREE.LineBasicMaterial({ color: 0x94a3b8, transparent: true, opacity: 0.2 });
            mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(g), edgesMat));
            
            const tag = new THREE.Mesh(
                new THREE.PlaneGeometry(0.6, 0.4), 
                new THREE.MeshBasicMaterial({ color: colorHex, side: THREE.DoubleSide })
            );
            tag.position.y = 0.505; 
            tag.rotation.x = -Math.PI / 2;
            mesh.add(tag);
            
            return mesh;
        }

        function createTruck() {
            truckContainer = new THREE.Group();
            
            // Chassis
            const chassisMat = new THREE.MeshPhongMaterial({ color: 0x334155 });
            const chassis = new THREE.Mesh(new THREE.BoxGeometry(12, 0.8, 26), chassisMat);
            chassis.position.y = 0.4;
            chassis.castShadow = true;
            chassis.receiveShadow = true;
            truckContainer.add(chassis);
            
            // Cab
            const cabMat = new THREE.MeshPhongMaterial({ color: 0x2563eb, shininess: 50 });
            const cab = new THREE.Mesh(new THREE.BoxGeometry(11, 7, 5), cabMat);
            cab.position.set(0, 3.9, 10.5);
            cab.castShadow = true;
            cab.receiveShadow = true;
            
            // Windshield
            const windowMat = new THREE.MeshPhongMaterial({ color: 0x0f172a, shininess: 100 });
            const windshield = new THREE.Mesh(new THREE.BoxGeometry(10.5, 3, 0.1), windowMat);
            windshield.position.set(0, 1.5, -2.55);
            cab.add(windshield);
            
            truckContainer.add(cab);
            
            // Cargo box wireframe (semitransparent guides)
            const cargo = new THREE.Mesh(
                new THREE.BoxGeometry(10.5, 8, 17.5), 
                new THREE.MeshBasicMaterial({ color: 0x64748b, wireframe: true, transparent: true, opacity: 0.15 })
            );
            cargo.position.set(0, 4.4, -2.5);
            truckContainer.add(cargo);
            
            scene.add(truckContainer);
        }

        function handleAutoLoad() {
            let qtyInput = document.getElementById('sackQuantity');
            let qty = parseInt(qtyInput.value);
            if (isNaN(qty) || qty <= 0) {
                showNotification('Cantidad inválida', 'error');
                return;
            }
            
            const select = document.getElementById('sackType');
            const colorHex = select.options[select.selectedIndex].dataset.color;
            
            let loadedAny = false;

            while (qty > 0) {
                // Find a pallet that is not full
                let p = loadedPallets.find(p => p.sacks < TOTAL_MAX_PALLET);
                
                // If all existing un-full pallets are full, or none exist, add a new one
                if (!p) {
                    if (loadedPallets.length >= MAX_PALLETS_PER_TRUCK) { 
                        showNotification('¡El camión está lleno!', 'error'); 
                        break; 
                    }
                    p = { sacks: 0, colors: [], mesh: new THREE.Group() };
                    loadedPallets.push(p);
                    
                    const idx = loadedPallets.length - 1;
                    const r = Math.floor(idx / 2), c = idx % 2;
                    // Position from Front -> Back
                    p.mesh.position.set(c === 0 ? -2.6 : 2.6, 1.2, 5.5 - (r * 4.3));
                    p.mesh.scale.set(0.9, 0.9, 0.9);
                    truckContainer.add(p.mesh);
                }
                
                // Fill up the found pallet
                let fill = Math.min(qty, TOTAL_MAX_PALLET - p.sacks);
                for(let k=0; k<fill; k++) {
                    p.colors.push({hex: colorHex, type: select.options[select.selectedIndex].text});
                }
                p.sacks += fill; 
                qty -= fill;
                loadedAny = true;
                updatePallet3D(p);
            }
            
            if(loadedAny) {
                showNotification('Carga añadida', 'success');
            }
            
            updateUI();
            
            // Mobile specific logic: close menu so they see the result, and stop camera auto rotate
            if (window.innerWidth < 768 && isMenuOpen) {
                isMenuOpen = false;
                updateMenuVisuals();
            }
            if(controls) controls.autoRotate = false;
        }

        function updatePallet3D(p) {
            // Clear existing meshes
            while(p.mesh.children.length > 0){ 
                p.mesh.remove(p.mesh.children[0]); 
            }
            
            p.mesh.add(createCustomPallet());
            
            for (let i = 0; i < p.sacks; i++) {
                const layer = Math.floor(i / SACOS_POR_FILA);
                const sub = i % SACOS_POR_FILA;
                const even = layer % 2 === 0;
                
                // Fetch the color registered for this specific sack to allow mixed palettes
                const bagData = p.colors[i];
                const bagColor = bagData ? bagData.hex : '#ffffff';
                const bag = createBag(bagColor);
                
                if (sub < 4) { // Orientación A
                    const row = Math.floor(sub / 2), col = sub % 2;
                    bag.scale.set(W, H, L);
                    let x = (TOTAL_WIDTH / 2) - L - (W / 2) - (col * W);
                    if (!even) x = -x;
                    bag.position.set(x, (layer * (H + 0.02)) + 0.15, (row === 0 ? -L / 2 : L / 2));
                } else { // Orientación B
                    const hIdx = sub - 4;
                    bag.scale.set(L, H, W);
                    let x = (TOTAL_WIDTH / 2) - (L / 2);
                    if (!even) x = -x;
                    bag.position.set(x, (layer * (H + 0.02)) + 0.15, (hIdx - 1) * W);
                }
                p.mesh.add(bag);
            }
        }

        function updateUI() {
            document.getElementById('totalPalletsCounter').innerText = `${loadedPallets.length} / 10`;
            const status = document.getElementById('truckStatus');
            document.getElementById('emptyTruckMsg').style.display = loadedPallets.length ? 'none' : 'flex';
            
            status.innerHTML = loadedPallets.map((p, i) => {
                const totalSacks = p.sacks;
                const percentage = (totalSacks / TOTAL_MAX_PALLET) * 100;
                
                // Agrupar colores
                const colorCounts = {};
                p.colors.forEach(item => {
                    if(colorCounts[item.hex]) colorCounts[item.hex].count++;
                    else colorCounts[item.hex] = { count: 1, type: item.type };
                });
                
                // Construir la barra de progreso segmentada
                const segmentsHTML = Object.entries(colorCounts).map(([hex, data]) => {
                    const segPercent = (data.count / TOTAL_MAX_PALLET) * 100;
                    return `<div class="h-full transition-all duration-500 ease-out" style="width: ${segPercent}%; background-color: ${hex}"></div>`;
                }).join('');
                
                return `
                <div class="flex flex-col bg-white p-3 md:p-4 rounded-2xl border border-slate-100 shadow-sm">
                    <div class="w-full flex justify-between items-center mb-2.5">
                        <span class="font-black text-[10px] md:text-xs text-slate-800 tracking-tight">PALET ${i + 1}</span>
                        <div class="flex items-center gap-1.5">
                            <span class="text-[10px] font-black ${totalSacks === 70 ? 'text-emerald-500' : 'text-slate-400'}">${totalSacks}/70</span>
                        </div>
                    </div>
                    <div class="w-full bg-slate-100 rounded-full h-2 overflow-hidden flex">
                        ${segmentsHTML}
                    </div>
                </div>
            `}).join('');
        }

        function showNotification(msg, type) {
            const wrapper = document.getElementById('notificationWrapper');
            const el = document.createElement('div');
            
            const isSuccess = (type === 'success');
            const bgClass = isSuccess ? 'bg-emerald-500' : 'bg-red-500';
            const iconSvg = isSuccess 
                ? '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>'
                : '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>';
            
            el.className = `px-5 py-3 rounded-full text-white font-bold text-xs shadow-xl flex items-center gap-2 min-w-max transition-all duration-300 transform -translate-y-4 opacity-0 ${bgClass}`;
            el.innerHTML = `${iconSvg} <span>${msg}</span>`;
            
            wrapper.appendChild(el);
            
            // Animate In
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    el.classList.remove('-translate-y-4', 'opacity-0');
                });
            });
            
            // Animate Out & Remove
            setTimeout(() => {
                el.classList.add('-translate-y-4', 'opacity-0');
                setTimeout(() => el.remove(), 300);
            }, 3000);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            updateMenuVisuals(); 
        }

        function animate() {
            requestAnimationFrame(animate);
            if(controls) controls.update(); // necessary for damping
            renderer.render(scene, camera);
        }

        window.onload = init3D;
    </script>
</body>

</html>
